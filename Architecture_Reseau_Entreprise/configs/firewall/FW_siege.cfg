! ============================================================
! FW_Siege — Firewall Cisco ASA 5506-X
! Auteur : SAIFEDDINE Abdellah
! Rôle    : Filtrage Internet, protection DMZ, NAT statique
! ============================================================

hostname FW-Siege-ASA
domain-name saifnet.local

enable password SaifNet@2024!
passwd SaifNet@2024!

! ============================================================
! INTERFACES
! ============================================================

interface GigabitEthernet1/1
 nameif outside
 security-level 0
 ip address dhcp
 no shutdown

interface GigabitEthernet1/2
 nameif inside
 security-level 100
 ip address 192.168.1.254 255.255.255.0
 no shutdown

interface GigabitEthernet1/3
 nameif dmz
 security-level 50
 ip address 192.168.40.254 255.255.255.240
 no shutdown

! ============================================================
! OBJETS RÉSEAU
! ============================================================

! Réseau interne global
object network OBJ_INSIDE
 subnet 192.168.0.0 255.255.0.0

! Serveur Web DMZ
object network OBJ_WEB_SERVER
 host 192.168.40.10
 description Serveur_Web_Apache

! Serveur Mail DMZ
object network OBJ_MAIL_SERVER
 host 192.168.40.11
 description Serveur_Mail_Postfix

! Serveur DNS public DMZ
object network OBJ_DNS_SERVER
 host 192.168.40.12
 description Serveur_DNS_BIND

! ============================================================
! NAT
! ============================================================

! PAT pour tout le réseau interne (masquage IP)
object network OBJ_INSIDE
 nat (inside,outside) dynamic interface

! NAT statique pour le serveur Web (HTTP/HTTPS publics)
object network OBJ_WEB_SERVER
 nat (dmz,outside) static interface service tcp www www
 nat (dmz,outside) static interface service tcp https https

! NAT statique pour le serveur Mail
object network OBJ_MAIL_SERVER
 nat (dmz,outside) static interface service tcp smtp smtp

! NAT statique pour le serveur DNS
object network OBJ_DNS_SERVER
 nat (dmz,outside) static interface service tcp domain domain
 nat (dmz,outside) static interface service udp domain domain

! ============================================================
! ACL
! ============================================================

! Trafic entrant depuis Internet (outside → dmz)
access-list ACL_OUTSIDE_IN extended permit tcp any object OBJ_WEB_SERVER eq www
access-list ACL_OUTSIDE_IN extended permit tcp any object OBJ_WEB_SERVER eq https
access-list ACL_OUTSIDE_IN extended permit tcp any object OBJ_MAIL_SERVER eq smtp
access-list ACL_OUTSIDE_IN extended permit tcp any object OBJ_DNS_SERVER eq domain
access-list ACL_OUTSIDE_IN extended permit udp any object OBJ_DNS_SERVER eq domain
access-list ACL_OUTSIDE_IN extended deny ip any any log

! La DMZ NE PEUT PAS initier vers le réseau interne
access-list ACL_DMZ_IN extended deny ip 192.168.40.0 255.255.255.240 192.168.0.0 255.255.0.0 log
access-list ACL_DMZ_IN extended permit ip any any

access-group ACL_OUTSIDE_IN in interface outside
access-group ACL_DMZ_IN in interface dmz

! ============================================================
! SSH et ASDM
! ============================================================

ssh 192.168.99.0 255.255.255.240 inside
ssh version 2
ssh timeout 10

crypto key generate rsa modulus 2048

aaa authentication ssh console LOCAL
username admin password Admin@2024! privilege 15

! ============================================================
! LOGGING
! ============================================================

logging enable
logging buffer-size 4096
logging buffered informational
logging trap warnings

end
