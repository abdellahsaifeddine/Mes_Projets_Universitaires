! ============================================================
! SW_Paris — Switch Accès Agence Paris
! Auteur : SAIFEDDINE Abdellah
! Modèle  : Cisco Catalyst 2960
! Rôle    : Accès utilisateurs, VLANs 70/80, trunk vers R2
! ============================================================

version 12.2
hostname SW-Paris-L2

enable secret SaifNet@2024!
service password-encryption
no ip domain-lookup

banner motd # Acces reserve - SaifNet Corp - Switch Paris #

vlan 70
 name RD
vlan 80
 name SUPPORT
vlan 99
 name MANAGEMENT
vlan 999
 name NATIF_TRUNK

interface Vlan99
 description MANAGEMENT
 ip address 192.168.99.7 255.255.255.240
 no shutdown

ip default-gateway 192.168.99.4

! --- Trunk vers R2 ---
interface GigabitEthernet0/1
 description TRUNK_VERS_R2
 switchport mode trunk
 switchport trunk native vlan 999
 switchport trunk allowed vlan 70,80,99
 no shutdown

! --- Ports VLAN 70 R&D ---
interface range FastEthernet0/1 - 16
 description ACCES_RD
 switchport mode access
 switchport access vlan 70
 switchport nonegotiate
 switchport port-security
 switchport port-security maximum 1
 switchport port-security mac-address sticky
 switchport port-security violation shutdown
 spanning-tree portfast
 no shutdown

! --- Ports VLAN 80 Support ---
interface range FastEthernet0/17 - 24
 description ACCES_SUPPORT
 switchport mode access
 switchport access vlan 80
 switchport nonegotiate
 switchport port-security
 switchport port-security maximum 1
 switchport port-security mac-address sticky
 switchport port-security violation shutdown
 spanning-tree portfast
 no shutdown

ip domain-name saifnet.local
crypto key generate rsa modulus 2048
ip ssh version 2

username admin privilege 15 secret Admin@2024!
line vty 0 4
 login local
 transport input ssh
 exec-timeout 10 0

end
