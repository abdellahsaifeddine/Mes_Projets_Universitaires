! ============================================================
! SW_Siege — Switch Multicouche L3 Siège Poitiers
! Auteur : SAIFEDDINE Abdellah
! Modèle  : Cisco Catalyst 3560
! Rôle    : Inter-VLAN routing (SVI), DHCP server, trunk
! ============================================================

version 12.2
hostname SW-Siege-L3

enable secret SaifNet@2024!
service password-encryption
no ip domain-lookup

! --- Activer le routage IP sur le switch L3 ---
ip routing

banner motd # Acces reserve - SaifNet Corp - Switch Siege #

! ============================================================
! CRÉATION DES VLANs
! ============================================================

vlan 10
 name DIRECTION
vlan 20
 name DSI
vlan 30
 name SERVEURS
vlan 40
 name DMZ
vlan 99
 name MANAGEMENT
vlan 999
 name NATIF_TRUNK

! ============================================================
! INTERFACES SVI (Inter-VLAN Routing)
! ============================================================

interface Vlan10
 description GATEWAY_DIRECTION
 ip address 192.168.10.1 255.255.255.192
 no shutdown

interface Vlan20
 description GATEWAY_DSI
 ip address 192.168.20.1 255.255.255.192
 no shutdown

interface Vlan30
 description GATEWAY_SERVEURS
 ip address 192.168.30.1 255.255.255.224
 no shutdown

interface Vlan40
 description GATEWAY_DMZ
 ip address 192.168.40.1 255.255.255.240
 no shutdown

interface Vlan99
 description MANAGEMENT
 ip address 192.168.99.5 255.255.255.240
 no shutdown

! ============================================================
! DHCP SERVER (pools par VLAN)
! ============================================================

! Exclure les adresses réservées (passerelle + statiques)
ip dhcp excluded-address 192.168.10.1 192.168.10.9
ip dhcp excluded-address 192.168.20.1 192.168.20.9
ip dhcp excluded-address 192.168.30.1 192.168.30.20

ip dhcp pool VLAN10_DIRECTION
 network 192.168.10.0 255.255.255.192
 default-router 192.168.10.1
 dns-server 192.168.30.11
 lease 1

ip dhcp pool VLAN20_DSI
 network 192.168.20.0 255.255.255.192
 default-router 192.168.20.1
 dns-server 192.168.30.11
 lease 1

! ============================================================
! PORTS TRUNK (vers R0 et ports montants)
! ============================================================

interface GigabitEthernet0/1
 description TRUNK_VERS_R0
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk native vlan 999
 switchport trunk allowed vlan 10,20,30,40,99
 no shutdown

! ============================================================
! PORTS ACCÈS UTILISATEURS
! ============================================================

! VLAN 10 — Direction (ports Fa0/1 à Fa0/10)
interface range FastEthernet0/1 - 10
 description ACCES_DIRECTION
 switchport mode access
 switchport access vlan 10
 switchport nonegotiate
 switchport port-security
 switchport port-security maximum 1
 switchport port-security mac-address sticky
 switchport port-security violation shutdown
 spanning-tree portfast
 no shutdown

! VLAN 20 — DSI (ports Fa0/11 à Fa0/16)
interface range FastEthernet0/11 - 16
 description ACCES_DSI
 switchport mode access
 switchport access vlan 20
 switchport nonegotiate
 switchport port-security
 switchport port-security maximum 1
 switchport port-security mac-address sticky
 switchport port-security violation shutdown
 spanning-tree portfast
 no shutdown

! VLAN 30 — Serveurs (ports Fa0/17 à Fa0/20)
interface range FastEthernet0/17 - 20
 description ACCES_SERVEURS
 switchport mode access
 switchport access vlan 30
 switchport nonegotiate
 no shutdown

! Ports inutilisés — désactivés
interface range FastEthernet0/21 - 24
 description PORT_INUTILISE
 switchport mode access
 switchport access vlan 999
 shutdown

! ============================================================
! ACL INTER-VLANs
! ============================================================

! Empêcher RH d'accéder à R&D
ip access-list extended ACL_INTER_VLAN
 permit ip 192.168.10.0 0.0.0.63 any
 permit ip 192.168.20.0 0.0.0.63 any
 deny   ip 192.168.60.0 0.0.0.31 192.168.70.0 0.0.0.63 log
 permit ip 192.168.0.0 0.0.255.255 any
 deny   ip any any log

! ============================================================
! SSH
! ============================================================

ip domain-name saifnet.local
crypto key generate rsa modulus 2048
ip ssh version 2

username admin privilege 15 secret Admin@2024!
line vty 0 4
 login local
 transport input ssh
 exec-timeout 10 0
line console 0
 login local
 exec-timeout 5 0

end
