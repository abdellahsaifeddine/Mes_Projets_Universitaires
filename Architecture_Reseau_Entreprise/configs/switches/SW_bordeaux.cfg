! ============================================================
! SW_Bordeaux — Switch Accès Agence Bordeaux
! Auteur : SAIFEDDINE Abdellah
! Modèle  : Cisco Catalyst 2960
! Rôle    : Accès utilisateurs, VLANs 50/60, trunk vers R1
! ============================================================

version 12.2
hostname SW-Bordeaux-L2

enable secret SaifNet@2024!
service password-encryption
no ip domain-lookup

banner motd # Acces reserve - SaifNet Corp - Switch Bordeaux #

! --- VLANs ---
vlan 50
 name COMMERCIAL
vlan 60
 name RH
vlan 99
 name MANAGEMENT
vlan 999
 name NATIF_TRUNK

! --- Interface management ---
interface Vlan99
 description MANAGEMENT
 ip address 192.168.99.6 255.255.255.240
 no shutdown

ip default-gateway 192.168.99.3

! --- Port trunk vers R1 ---
interface GigabitEthernet0/1
 description TRUNK_VERS_R1
 switchport mode trunk
 switchport trunk native vlan 999
 switchport trunk allowed vlan 50,60,99
 no shutdown

! --- Ports accès VLAN 50 Commercial (Fa0/1 - Fa0/20) ---
interface range FastEthernet0/1 - 20
 description ACCES_COMMERCIAL
 switchport mode access
 switchport access vlan 50
 switchport nonegotiate
 switchport port-security
 switchport port-security maximum 1
 switchport port-security mac-address sticky
 switchport port-security violation shutdown
 spanning-tree portfast
 no shutdown

! --- Ports accès VLAN 60 RH (Fa0/21 - Fa0/24) ---
interface range FastEthernet0/21 - 24
 description ACCES_RH
 switchport mode access
 switchport access vlan 60
 switchport nonegotiate
 switchport port-security
 switchport port-security maximum 1
 switchport port-security mac-address sticky
 switchport port-security violation shutdown
 spanning-tree portfast
 no shutdown

! --- SSH ---
ip domain-name saifnet.local
crypto key generate rsa modulus 2048
ip ssh version 2

username admin privilege 15 secret Admin@2024!
line vty 0 4
 login local
 transport input ssh
 exec-timeout 10 0

end
