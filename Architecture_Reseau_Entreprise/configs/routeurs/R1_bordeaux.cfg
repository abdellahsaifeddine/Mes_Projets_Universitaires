! ============================================================
! R1 — Routeur Agence Bordeaux
! Auteur : SAIFEDDINE Abdellah
! Modèle  : Cisco 1941
! Rôle    : Routage WAN, Router-on-a-stick inter-VLAN, DHCP relay
! ============================================================

version 15.2
hostname R1-Agence-Bordeaux

enable secret SaifNet@2024!
service password-encryption
no ip domain-lookup

banner motd # Acces reserve - SaifNet Corp - Agence Bordeaux #

! --- Loopback ---
interface Loopback0
 description ROUTER_ID_OSPF
 ip address 2.2.2.2 255.255.255.255
 no shutdown

! --- Lien WAN vers R0 Siège ---
interface Serial0/0/0
 description WAN_VERS_SIEGE
 ip address 10.0.0.2 255.255.255.252
 ip ospf network point-to-point
 no shutdown

! --- Lien trunk vers SW_Bordeaux (Router-on-a-stick) ---
interface GigabitEthernet0/0
 description TRUNK_VERS_SW_BORDEAUX
 no ip address
 no shutdown

! Sous-interface VLAN 50 — Commercial
interface GigabitEthernet0/0.50
 description VLAN50_COMMERCIAL
 encapsulation dot1Q 50
 ip address 192.168.50.1 255.255.255.192
 ! Relay DHCP vers serveur central au siège
 ip helper-address 192.168.30.10
 no shutdown

! Sous-interface VLAN 60 — RH
interface GigabitEthernet0/0.60
 description VLAN60_RH
 encapsulation dot1Q 60
 ip address 192.168.60.1 255.255.255.224
 ip helper-address 192.168.30.10
 no shutdown

! Sous-interface VLAN 99 — Management
interface GigabitEthernet0/0.99
 description VLAN99_MANAGEMENT
 encapsulation dot1Q 99 native
 ip address 192.168.99.3 255.255.255.240
 no shutdown

! --- OSPF ---
router ospf 1
 router-id 2.2.2.2
 network 192.168.50.0 0.0.0.63 area 0
 network 192.168.60.0 0.0.0.31 area 0
 network 192.168.99.0 0.0.0.15 area 0
 network 10.0.0.0 0.0.0.3 area 0

! --- SSH ---
ip domain-name saifnet.local
crypto key generate rsa modulus 2048
ip ssh version 2

username admin privilege 15 secret Admin@2024!
line vty 0 4
 login local
 transport input ssh
 exec-timeout 10 0
line console 0
 login local
 exec-timeout 5 0

end
