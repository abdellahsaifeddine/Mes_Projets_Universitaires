! ============================================================
! R0 — Routeur Principal Siège Poitiers
! Auteur : SAIFEDDINE Abdellah
! Modèle  : Cisco 2901
! Rôle    : Routage WAN, NAT/PAT, OSPF, DHCP relay
! ============================================================

version 15.2
hostname R0-Siege-Poitiers

! --- Sécurité de base ---
enable secret SaifNet@2024!
service password-encryption
no ip domain-lookup

! --- Bannière ---
banner motd # Acces reserve - SaifNet Corp - Site Siege Poitiers #

! --- Loopback (Router-ID OSPF) ---
interface Loopback0
 description ROUTER_ID_OSPF
 ip address 1.1.1.1 255.255.255.255
 no shutdown

! --- Interface WAN vers Internet (via Firewall ASA) ---
interface GigabitEthernet0/0
 description WAN_VERS_INTERNET
 ip address dhcp
 ip nat outside
 ip access-group ACL_WAN_IN in
 no shutdown

! --- Interface vers Switch L3 Siège (trunk) ---
interface GigabitEthernet0/1
 description VERS_SW_SIEGE_L3
 ip address 192.168.99.2 255.255.255.240
 ip nat inside
 no shutdown

! --- Sous-interface WAN vers Agence Bordeaux ---
interface Serial0/0/0
 description WAN_VERS_BORDEAUX
 ip address 10.0.0.1 255.255.255.252
 ip ospf network point-to-point
 no shutdown

! --- Sous-interface WAN vers Agence Paris ---
interface Serial0/0/1
 description WAN_VERS_PARIS
 ip address 10.0.1.1 255.255.255.252
 ip ospf network point-to-point
 no shutdown

! --- OSPF ---
router ospf 1
 router-id 1.1.1.1
 ! Annonce des réseaux internes
 network 192.168.10.0 0.0.0.63 area 0
 network 192.168.20.0 0.0.0.63 area 0
 network 192.168.30.0 0.0.0.31 area 0
 network 192.168.40.0 0.0.0.15 area 0
 network 192.168.50.0 0.0.0.63 area 0
 network 192.168.60.0 0.0.0.31 area 0
 network 192.168.70.0 0.0.0.63 area 0
 network 192.168.80.0 0.0.0.31 area 0
 network 192.168.99.0 0.0.0.15 area 0
 ! Liens WAN
 network 10.0.0.0 0.0.0.3 area 0
 network 10.0.1.0 0.0.0.3 area 0
 ! Route par défaut vers Internet via OSPF
 default-information originate always

! --- NAT/PAT ---
! ACL définissant les réseaux internes à natter
ip access-list standard ACL_NAT_INSIDE
 permit 192.168.0.0 0.0.255.255
 deny any

ip nat inside source list ACL_NAT_INSIDE interface GigabitEthernet0/0 overload

! --- ACL WAN entrante (anti-spoofing + filtrage) ---
ip access-list extended ACL_WAN_IN
 ! Bloquer adresses privées venant d'Internet (spoofing)
 deny ip 10.0.0.0 0.255.255.255 any log
 deny ip 172.16.0.0 0.15.255.255 any log
 deny ip 192.168.0.0 0.0.255.255 any log
 deny ip 127.0.0.0 0.255.255.255 any log
 ! Autoriser trafic établi (réponses aux connexions initiées depuis l'intérieur)
 permit tcp any any established
 ! Autoriser ICMP (ping) limité
 permit icmp any any echo-reply
 ! Autoriser accès DMZ depuis Internet
 permit tcp any host 192.168.40.10 eq 80
 permit tcp any host 192.168.40.10 eq 443
 permit tcp any host 192.168.40.11 eq 25
 permit tcp any host 192.168.40.12 eq 53
 permit udp any host 192.168.40.12 eq 53
 ! Tout le reste est refusé et journalisé
 deny ip any any log

! --- SSH ---
ip domain-name saifnet.local
crypto key generate rsa modulus 2048
ip ssh version 2

! --- Accès d'administration ---
username admin privilege 15 secret Admin@2024!
line vty 0 4
 login local
 transport input ssh
 exec-timeout 10 0
line console 0
 login local
 exec-timeout 5 0

! --- Désactiver les services inutiles ---
no service finger
no ip http server
no ip http secure-server
no cdp run

end
