! ============================================================
! R2 — Routeur Agence Paris
! Auteur : SAIFEDDINE Abdellah
! Modèle  : Cisco 1941
! Rôle    : Routage WAN, Router-on-a-stick inter-VLAN, DHCP relay
! ============================================================

version 15.2
hostname R2-Agence-Paris

enable secret SaifNet@2024!
service password-encryption
no ip domain-lookup

banner motd # Acces reserve - SaifNet Corp - Agence Paris #

! --- Loopback ---
interface Loopback0
 description ROUTER_ID_OSPF
 ip address 3.3.3.3 255.255.255.255
 no shutdown

! --- Lien WAN vers R0 Siège ---
interface Serial0/0/0
 description WAN_VERS_SIEGE
 ip address 10.0.1.2 255.255.255.252
 ip ospf network point-to-point
 no shutdown

! --- Lien trunk vers SW_Paris ---
interface GigabitEthernet0/0
 description TRUNK_VERS_SW_PARIS
 no ip address
 no shutdown

! Sous-interface VLAN 70 — R&D
interface GigabitEthernet0/0.70
 description VLAN70_RD
 encapsulation dot1Q 70
 ip address 192.168.70.1 255.255.255.192
 ip helper-address 192.168.30.10
 no shutdown

! Sous-interface VLAN 80 — Support
interface GigabitEthernet0/0.80
 description VLAN80_SUPPORT
 encapsulation dot1Q 80
 ip address 192.168.80.1 255.255.255.224
 ip helper-address 192.168.30.10
 no shutdown

! Sous-interface VLAN 99 — Management
interface GigabitEthernet0/0.99
 description VLAN99_MANAGEMENT
 encapsulation dot1Q 99 native
 ip address 192.168.99.4 255.255.255.240
 no shutdown

! --- OSPF ---
router ospf 1
 router-id 3.3.3.3
 network 192.168.70.0 0.0.0.63 area 0
 network 192.168.80.0 0.0.0.31 area 0
 network 192.168.99.0 0.0.0.15 area 0
 network 10.0.1.0 0.0.0.3 area 0

! --- SSH ---
ip domain-name saifnet.local
crypto key generate rsa modulus 2048
ip ssh version 2

username admin privilege 15 secret Admin@2024!
line vty 0 4
 login local
 transport input ssh
 exec-timeout 10 0
line console 0
 login local
 exec-timeout 5 0

end
